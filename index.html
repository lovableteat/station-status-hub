<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>station-status-hub</title>
    <meta name="description" content="Lovable Generated Project" />

    <meta property="og:title" content="station-status-hub" />
    <meta property="og:description" content="Lovable Generated Project" />

    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        const RETRY_KEY = "station-status-hub:boot-retry";

        function renderFallbackMessage() {
          const root = document.getElementById("root");
          if (!root || root.children.length > 0) return;
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#08111f;color:#e2e8f0;font-family:Arial,sans-serif;">' +
            '<div style="max-width:520px;border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:28px;background:rgba(15,23,42,.88);box-shadow:0 24px 80px rgba(2,8,23,.34);">' +
            '<div style="font-size:28px;font-weight:700;margin-bottom:12px;">頁面重新同步中</div>' +
            '<div style="font-size:15px;line-height:1.8;color:#cbd5e1;">剛剛偵測到瀏覽器快取的舊版檔案，系統已經自動重新整理一次。如果你還是看到空白頁，請再按一次重新整理。</div>' +
            "</div></div>";
        }

        function retryBoot(reason) {
          const hasRetried = sessionStorage.getItem(RETRY_KEY) === "1";
          if (hasRetried) {
            console.warn("station-status-hub boot retry already used:", reason);
            renderFallbackMessage();
            return;
          }

          sessionStorage.setItem(RETRY_KEY, "1");
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("reload", Date.now().toString());
          window.location.replace(nextUrl.toString());
        }

        window.addEventListener(
          "error",
          function (event) {
            const target = event.target;
            if (
              target &&
              target.tagName === "SCRIPT" &&
              typeof target.src === "string" &&
              target.src.includes("/assets/index-")
            ) {
              retryBoot("asset-load-error");
            }
          },
          true
        );

        window.addEventListener("load", function () {
          setTimeout(function () {
            const root = document.getElementById("root");
            const hasRendered = !!root && root.children.length > 0;
            if (hasRendered) {
              sessionStorage.removeItem(RETRY_KEY);
              return;
            }
            retryBoot("empty-root-after-load");
          }, 2200);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
