<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta property="og:title" content="station-status-hub" />
    <meta property="og:description" content="Lovable Generated Project" />

    <meta name="twitter:card" content="summary_large_image" />

    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #071827;
      }

      #app-boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
        color: #f3f8fc;
        font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.24), transparent 34rem),
          linear-gradient(145deg, #071827, #0b2033 60%, #0d2a3f);
      }

      .app-boot-panel {
        width: min(440px, 100%);
        padding: 24px;
        box-sizing: border-box;
        border: 1px solid rgba(125, 211, 252, 0.48);
        border-radius: 16px;
        background: #0d2237;
      }

      .app-boot-row {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .app-boot-mark {
        width: 48px;
        height: 48px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: #38bdf8;
      }

      .app-boot-dot {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        background: #071827;
        animation: app-boot-pulse 1.1s ease-in-out infinite;
      }

      .app-boot-title {
        margin: 0;
        font-size: 18px;
        font-weight: 750;
      }

      .app-boot-copy {
        margin: 5px 0 0;
        color: #bae6fd;
        font-size: 14px;
        line-height: 1.5;
      }

      .app-boot-track {
        height: 6px;
        margin-top: 20px;
        overflow: hidden;
        border-radius: 999px;
        background: #071827;
      }

      .app-boot-progress {
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #7dd3fc;
        animation: app-boot-scan 1.45s cubic-bezier(0.22, 1, 0.36, 1) infinite alternate;
      }

      @keyframes app-boot-pulse {
        0%,
        100% {
          opacity: 0.48;
          transform: scale(0.72);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes app-boot-scan {
        from {
          transform: translateX(-20%);
        }
        to {
          transform: translateX(150%);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-boot-dot,
        .app-boot-progress {
          animation: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="app-boot" role="status" aria-live="polite">
        <div class="app-boot-panel">
          <div class="app-boot-row">
            <div class="app-boot-mark" aria-hidden="true">
              <div class="app-boot-dot"></div>
            </div>
            <div>
              <p class="app-boot-title">正在啟動工作整合平台</p>
              <p class="app-boot-copy">正在同步最新版本與專案資料</p>
            </div>
          </div>
          <div class="app-boot-track" aria-hidden="true">
            <div class="app-boot-progress"></div>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        const RETRY_KEY = "station-status-hub:boot-retry";
        const FALLBACK_TITLE = "\u9801\u9762\u6c92\u6709\u5b8c\u6210\u555f\u52d5";
        const FALLBACK_MESSAGE =
          "\u7cfb\u7d71\u5df2\u505c\u6b62\u81ea\u52d5\u91cd\u65b0\u6574\u7406\uff0c\u907f\u514d\u624b\u6a5f\u4e0d\u65b7\u958b\u555f\u65b0\u7684\u700f\u89bd\u7d00\u9304\u3002\u8acb\u6309\u4e0b\u65b9\u6309\u9215\u624b\u52d5\u8f09\u5165\u6700\u65b0\u7248\u672c\u3002";
        const FALLBACK_BUTTON = "\u624b\u52d5\u8f09\u5165\u6700\u65b0\u7248\u672c";

        window.__STATION_MANUAL_RELOAD__ = function () {
          try {
            window.sessionStorage.removeItem(RETRY_KEY);
          } catch {
            // Manual recovery remains available when storage is blocked.
          }
          const nextUrl = new URL(window.location.href);
          nextUrl.searchParams.set("reload", Date.now().toString());
          window.location.replace(nextUrl.toString());
        };

        function renderFallbackMessage(force) {
          const root = document.getElementById("root");
          if (!root || (!force && window.__STATION_APP_READY__ === true)) return;

          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#08111f;color:#e2e8f0;font-family:Arial,sans-serif;">' +
            '<div style="max-width:560px;border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:28px;background:rgba(15,23,42,.88);box-shadow:0 24px 80px rgba(2,8,23,.34);">' +
            '<div style="font-size:28px;font-weight:700;margin-bottom:12px;">' +
            FALLBACK_TITLE +
            "</div>" +
            '<div style="font-size:15px;line-height:1.8;color:#cbd5e1;">' +
            FALLBACK_MESSAGE +
            "</div>" +
            '<button onclick="window.__STATION_MANUAL_RELOAD__()" style="margin-top:18px;height:44px;padding:0 18px;border:none;border-radius:999px;background:#38bdf8;color:#082032;font-size:14px;font-weight:700;cursor:pointer;">' +
            FALLBACK_BUTTON +
            "</button>" +
            "</div></div>";
        }

        function retryBoot(reason, fingerprint) {
          try {
            fingerprint = fingerprint || reason;
            const hasRetried = window.sessionStorage.getItem(RETRY_KEY) === fingerprint;
            if (hasRetried) {
              console.warn("station-status-hub boot retry already used:", reason);
              renderFallbackMessage(true);
              return;
            }

            window.sessionStorage.setItem(RETRY_KEY, fingerprint);
            const nextUrl = new URL(window.location.href);
            nextUrl.searchParams.set("reload", Date.now().toString());
            window.location.replace(nextUrl.toString());
          } catch {
            renderFallbackMessage(true);
          }
        }

        window.addEventListener(
          "error",
          function (event) {
            const target = event.target;
            if (
              target &&
              target.tagName === "SCRIPT" &&
              typeof target.src === "string" &&
              target.src.includes("/assets/index-")
            ) {
              retryBoot("asset-load-error", target.src);
              return;
            }

            if (event.error) {
              if (window.__STATION_APP_READY__ !== true) {
                console.error("station-status-hub failed before mount:", event.error);
                renderFallbackMessage(true);
                return;
              }

              window.setTimeout(function () {
                const root = document.getElementById("root");
                if (root && root.children.length === 0) {
                  renderFallbackMessage(true);
                }
              }, 0);
            }
          },
          true
        );

        window.addEventListener("unhandledrejection", function (event) {
          if (window.__STATION_APP_READY__ !== true) {
            console.error("station-status-hub rejected before mount:", event.reason);
            renderFallbackMessage(true);
          }
        });

        window.addEventListener("station-app-ready", function () {
          window.__STATION_APP_READY__ = true;
        });

        window.setTimeout(function () {
          if (window.__STATION_APP_READY__ !== true) {
            renderFallbackMessage(true);
          }
        }, 15000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
